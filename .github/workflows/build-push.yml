name: Build and Push Container Image

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - 'modules/**'
      - 'lib/**'
      - 'template/**'
      - 'cli/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/build-push.yml'

env:
  REGISTRY: quay.io
  IMAGE_NAME: rh-ee-hgudmund/torched-devcontainer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build and export HM closure
        run: |
          echo "Building HM config closure..."
          hm_path=$(nix build .#container-home --no-link --print-out-paths)

          echo "Exporting closure to NAR..."
          nix-store --export $(nix-store -qR "$hm_path") > container/closure.nar

          echo "Closure size: $(du -sh container/closure.nar | cut -f1)"

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: container
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
