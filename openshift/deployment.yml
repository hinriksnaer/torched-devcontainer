# TorchedDevcontainer -- OpenShift deployment template.
#
# Replace <username> with your OpenShift username.
# Container image: quay.io/rh-ee-hgudmund/torched-devcontainer
#
# Prerequisites (create these in your namespace first):
#   - Secret:  <username>-git-ssh-key    (ssh-privatekey, ssh-publickey, known_hosts)
#   - Secret:  <username>-gcloud-config  (application_default_credentials.json)
#   - PVC:     nix-store-<username>      (NFS storage, created by create-pvc.sh)
#   - PVC:     home-<username>           (NFS storage, created by create-pvc.sh)
#
# Deploy:
#   ./create-pvc.sh <username>
#   ./deploy.sh <username>
#   oc scale deployment <username>-dev -n <username> --replicas=1
#
# Connect:
#   oc exec -it deployment/<username>-dev -- zsh
#
# Pod is fully configured when it reaches Running state.
# To customize: vim ~/workspace/settings/settings.nix && torched apply
kind: Deployment
apiVersion: apps/v1
metadata:
  name: <username>-dev
  namespace: <username>
spec:
  replicas: 0
  selector:
    matchLabels:
      app: <username>-dev
  template:
    metadata:
      labels:
        app: <username>-dev
    spec:
      volumes:
        - name: ssh-key
          secret:
            secretName: <username>-git-ssh-key
            items:
              - key: ssh-privatekey
                path: id_ed25519
              - key: ssh-publickey
                path: id_ed25519.pub
              - key: known_hosts
                path: known_hosts
            defaultMode: 0600

        - name: gcloud-config
          secret:
            secretName: <username>-gcloud-config
            defaultMode: 0600

        - name: nix-store
          persistentVolumeClaim:
            claimName: nix-store-<username>

        - name: home
          persistentVolumeClaim:
            claimName: home-<username>

        - name: dshm
          emptyDir:
            medium: Memory

      initContainers:
        # Stage 1: Seed /nix PVC on first boot
        - name: init-nix
          image: 'quay.io/rh-ee-hgudmund/torched-devcontainer:latest'
          command:
            - /bin/bash
            - '-c'
            - |
              if [ ! -d /mnt/nix/store ]; then
                echo ":: seeding Nix store..."
                cp -a /nix/. /mnt/nix/
              fi
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: nix-store
              mountPath: /mnt/nix

        # Stage 2: Clone/pull settings + home-manager switch
        - name: init-config
          image: 'quay.io/rh-ee-hgudmund/torched-devcontainer:latest'
          env:
            - name: HM_PROFILE
              value: "<hm_profile>"
            - name: SETTINGS_REPO
              value: "<settings_repo>"
          command:
            - /bin/bash
            - '-c'
            - |
              # Ensure nix config exists on persistent /root
              mkdir -p /root/.config/nix
              if [ ! -f /root/.config/nix/nix.conf ]; then
                printf 'experimental-features = nix-command flakes\nbuild-users-group =\nbuild-dir = /tmp/nix-builds\n' > /root/.config/nix/nix.conf
              elif ! grep -q 'build-dir' /root/.config/nix/nix.conf; then
                printf 'build-dir = /tmp/nix-builds\n' >> /root/.config/nix/nix.conf
              fi

              . /root/.nix-profile/etc/profile.d/nix.sh 2>/dev/null || true

              # SSH keys for git clone
              mkdir -p /root/.ssh
              cp /root/.ssh-keys/id_ed25519 /root/.ssh/id_ed25519 2>/dev/null
              cp /root/.ssh-keys/known_hosts /root/.ssh/known_hosts 2>/dev/null
              chmod 700 /root/.ssh 2>/dev/null; chmod 600 /root/.ssh/* 2>/dev/null

              # Clone/pull settings
              if [ -n "$SETTINGS_REPO" ]; then
                if [ ! -d ~/workspace/settings ]; then
                  echo ":: cloning settings repo..."
                  /usr/bin/git clone "$SETTINGS_REPO" ~/workspace/settings
                elif [ ! -d ~/workspace/settings/.git ]; then
                  echo ":: backing up template, cloning settings repo..."
                  mv ~/workspace/settings ~/workspace/settings.bak
                  /usr/bin/git clone "$SETTINGS_REPO" ~/workspace/settings
                else
                  echo ":: updating settings repo..."
                  /usr/bin/git -C ~/workspace/settings pull --ff-only 2>/dev/null || true
                fi
              else
                if [ ! -f ~/workspace/settings/flake.nix ]; then
                  echo ":: initializing settings from template..."
                  mkdir -p ~/workspace/settings
                  cd ~/workspace/settings
                  nix flake init -t github:hinriksnaer/torched-devcontainer --refresh
                fi
              fi

              # Home-manager switch (persists to /root PVC)
              echo ":: applying home-manager config (profile: ${HM_PROFILE:-default})..."
              nix run home-manager/master -- switch -b backup \
                --flake "/root/workspace/settings#${HM_PROFILE:-default}" || true
          resources:
            limits:
              cpu: '4'
              memory: 8Gi
            requests:
              cpu: '4'
              memory: 8Gi
          volumeMounts:
            - name: nix-store
              mountPath: /nix
            - name: home
              mountPath: /root
            - name: ssh-key
              mountPath: /root/.ssh-keys
              readOnly: true
            - name: gcloud-config
              mountPath: /root/.config/gcloud
              readOnly: true

      containers:
        - name: dev
          image: 'quay.io/rh-ee-hgudmund/torched-devcontainer:latest'
          imagePullPolicy: Always
          stdin: true
          tty: true
          command:
            - /bin/bash
            - '-c'
            - |
              chmod 755 /root
              cp /root/.ssh-keys/id_ed25519.pub /root/.ssh/authorized_keys 2>/dev/null
              chmod 600 /root/.ssh/authorized_keys 2>/dev/null
              /usr/sbin/dropbear -R -E -p 22
              exec /bin/bash
          ports:
            - containerPort: 22
              protocol: TCP
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: '16'
              memory: 64Gi
              nvidia.com/mig-2g.35gb: '1'
            requests:
              cpu: '16'
              memory: 64Gi
              nvidia.com/mig-2g.35gb: '1'
          volumeMounts:
            - name: home
              mountPath: /root
            - name: nix-store
              mountPath: /nix
            - name: ssh-key
              mountPath: /root/.ssh-keys
              readOnly: true
            - name: gcloud-config
              mountPath: /root/.config/gcloud
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      schedulerName: default-scheduler

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
